{# Enterprise Check List Item
   Usage:
   {% include "ui/components/public/check_list_item.html" with
     text="Item text"
     status="success|warning|info"
   %}
#}
{% with status=status|default:"success" %}
<li class="flex items-start gap-3">
  <span class="mt-1 h-2 w-2 shrink-0 rounded-full {% if status == 'success' %}bg-success{% elif status == 'warning' %}bg-warning{% else %}bg-info{% endif %}"></span>
  <span>{{ text }}</span>
</li>
{% endwith %}
