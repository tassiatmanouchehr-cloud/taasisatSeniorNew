<article class="rounded-3xl border border-border bg-surface p-6 shadow-sm transition-all hover:shadow-md">

  <h3 class="mt-5 text-xl font-black text-text">{{ title }}</h3>
  <p class="mt-3 text-sm leading-8 text-text-muted">{{ description }}</p>
</article>
