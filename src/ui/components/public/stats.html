{% with bg=bg|default:"surface" %}
<section class="{% if bg == 'surface' %}border-y border-border bg-surface{% else %}bg-background{% endif %}">
  <div class="mx-auto max-w-7xl px-4 py-14 sm:px-6 lg:px-8">
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      {% block stats_items %}
      <!-- Override this block or pass stats context variable -->
      {% endblock %}
    </div>
  </div>
</section>
{% endwith %}
