<!DOCTYPE html>
<html lang="fa-IR" dir="rtl" class="{% block html_class %}{% endblock %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}{% endblock %}{% block title_suffix %} | سالمندیار{% endblock %}</title>

  {% block font_preload %}{% endblock %}

  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <!-- Compiled CSS (Tailwind + themes + typography + RTL) -->
  <link rel="stylesheet" href="/static/css/output.css">
  <link rel="stylesheet" href="/static/css/enterprise-supplement.css">

  <!-- Theme: prevent flash of wrong theme -->
  <script src="/static/ui/js/theme.js"></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="font-sans antialiased min-h-screen bg-background text-text {% block body_class %}{% endblock %}"
      {% block body_attrs %}{% endblock %}>

  <!-- Skip to content (accessibility) -->
  <a href="#main-content"
     class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:inset-inline-start-4 focus:z-max
            bg-primary text-text-inverse px-4 py-2 rounded font-semibold">
    رد شدن به محتوای اصلی
  </a>

  {% block body %}
  <!-- Layout-specific content injected here -->
  {% endblock %}

  <!-- HTMX -->
  <script src="/static/ui/js/htmx.min.js" defer></script>
  <!-- Alpine.js -->
  <script src="/static/ui/js/alpine.min.js" defer></script>
  <!-- App utilities -->
  <script src="/static/ui/js/app.js" defer></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
